<!--
    course.html

    Displays the course registration interface where a student can
    manually enter a Course ID and submit a registration request.

    Student Persona Component:
    - Allows the student to register for a single course object
    - Works together with registration.js
    - Prevents access unless the student is logged in (handled in JS)
    - Provides a simple, direct registration workflow

    Data Flow:
    - registration.js validates sessionStorage for authentication
    - registration.js listens for form submission
    - registration.js sends POST /api/registration with:
        {
            "username": "<student>",
            "courseId": "<entered value>"
        }
    - registration.js updates #registration-message with success/failure

    Current Implementation Notes:
    - Course lookup is manual (student enters Course ID)
    - No dropdown or course list is displayed here
    - Styling is provided by css/styles.css
    - Navigation bar links to other persona pages

    Future Enhancements:
    - Replace manual Course ID entry with a dropdown of course objects
    - Add validation to ensure Course ID exists before submission
    - Add confirmation modal before registration
    - Add schedule conflict detection
    - Add credit limit validation
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Registration</title>

    <!--
        registration.js handles:
        - Authentication check
        - Form submission
        - Sending registration request to backend
        - Displaying success/failure messages
    -->
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/registration.js" defer></script>
</head>

<body>
<header>
    <h1>Course Registration</h1>
</header>

<!--
    Navigation bar for Student Persona pages.
    Ensures consistent movement between dashboard, course list, and financial status.
-->
<nav>
    <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="course.html">Courses</a></li>
        <li><a href="financial.html">Financial</a></li>
    </ul>
</nav>

<main>
    <section id="registration-section">
        <h2>Register for a Course</h2>

        <!--
            Registration form:
            - Student enters a Course ID manually
            - registration.js intercepts form submission
            - registration.js sends POST /api/registration
        -->
        <form id="registration-form">
            <label>Course ID:
                <input type="text" id="course-id" required>
            </label>

            <button type="submit">Register</button>
        </form>

        <!--
            registration.js writes success/failure messages here.
        -->
        <p id="registration-message"></p>
    </section>
</main>
</body>
</html>
