<!--financial.html

    Financial Status Page
    ----------------------
    Displays the student's current financial status for the Online Course Registration System.
    This page relies on:
        - financial.js for fetching data from /api/financial/{studentId}
        - styles.css for layout and styling
-->

<!DOCTYPE html>
<html lang="en">
<head>
<script src="js/logout.js" defer></script>
<meta charset="UTF-8">
<title>Financial Status - Online Course Registration</title>

<!-- Global stylesheet for all pages -->
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<!--
    Page Header
    -----------
    Provides the title and basic navigation back to the dashboard.
-->
<header class="page-header">
    <h1>Financial Status</h1>

    <nav class="nav-bar">
        <a href="/dashboard.html">Dashboard</a>
        <a href="/course.html">Courses</a>
        <a href="/registration.html">Registration</a>
        <a href="/financial.html" class="active">Financial</a>
    </nav>

    <button class="logout-button" onclick="logoutUser()">Logout</button>
</header>

<!--
    Main Content Area
    -----------------
    Contains the financial summary for the currently logged-in student.
    The content is populated dynamically by financial.js.
-->
<main class="content">
    <!-- Container for student financial information -->
    <section id="financial-summary" class="card">
        <h2>Account Summary</h2>

        <!--
            These fields are populated by financial.js using data from
            /api/financial/{studentId}.
        -->
        <div class="financial-row">
            <span class="label">Student Name:</span>
            <span id="student-name" class="value">Loading...</span>
        </div>

        <div class="financial-row">
            <span class="label">Total Tuition:</span>
            <span id="total-tuition" class="value">Loading...</span>
        </div>

        <div class="financial-row">
            <span class="label">Amount Paid:</span>
            <span id="amount-paid" class="value">Loading...</span>
        </div>

        <div class="financial-row">
            <span class="label">Outstanding Balance:</span>
            <span id="outstanding-balance" class="value">Loading...</span>
        </div>

        <div class="financial-row">
            <span class="label">Payment Status:</span>
            <span id="payment-status" class="value status">Loading...</span>
        </div>
    </section>

    <!--
        Optional transaction history section.
        Populated by financial.js if the backend provides a list of
        payments or charges.
    -->
    <section id="transaction-history" class="card">
        <h2>Transaction History</h2>
        <table>
            <thead>
            <tr>
                <th>Date</th>
                <th>Description</th>
                <th>Amount</th>
            </tr>
            </thead>
            <tbody id="transaction-table-body">
            <!-- Rows inserted dynamically by financial.js -->
            </tbody>
        </table>
    </section>
</main>

<!--
    Page Footer
    -----------
    Simple footer for branding or additional links.
-->
<footer class="page-footer">
    <p>&copy; 2026 Online Course Registration System</p>
</footer>

<!--
    JavaScript
    ----------
    financial.js is responsible for:
    - Determining the current student (from localStorage or query params)
    - Calling /api/financial/{studentId}
    - Populating the fields above with returned JSON data
    - Rendering transaction history if available
-->
<script src="/js/financial.js"></script>
</body>
</html>
