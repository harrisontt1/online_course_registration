<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Administrator Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/logout.js" defer></script>
    <script src="js/admin-dashboard.js" defer></script>
</head>

<body>
<header class="page-header">
    <h1>Administrator Dashboard</h1>
    <button class="logout-button" onclick="logoutUser()">Logout</button>
</header>

<nav>
    <ul>
        <li><a href="admin-dashboard.html">Admin Dashboard</a></li>
    </ul>
</nav>

<main>
    <section>
        <h2>Manage Courses</h2>

        <form id="course-form">
            <label>Course ID:
                <input type="text" id="course-id" required>
            </label>

            <label>Course Name:
                <input type="text" id="course-name" required>
            </label>

            <label>Instructor:
                <input type="text" id="course-instructor" required>
            </label>

            <label>Credits:
                <input type="number" id="course-credits" required>
            </label>

            <label>Meeting Time:
                <input type="text" id="course-meeting-time" required>
            </label>

            <button type="submit">Add Course</button>
        </form>

        <p id="admin-message"></p>
    </section>

    <section>
        <h2>Existing Courses</h2>

        <table>
            <thead>
            <tr>
                <th>Course ID</th>
                <th>Name</th>
                <th>Instructor</th>
                <th>Credits</th>
                <th>Meeting Time</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="admin-course-table-body"></tbody>
        </table>
    </section>
</main>
</body>
</html>
