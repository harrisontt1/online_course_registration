<!--
    dashboard.html

    Serves as the main landing page after a successful login. This page
    displays personalized student information retrieved by dashboard.js,
    including the student’s name, ID, number of registered course objects,
    and financial/account status.

    Student Persona Component:
    - Displays authenticated student identity (name + ID)
    - Shows number of registered course objects
    - Shows financial/account status
    - Provides navigation to other persona pages (Course, Registration, Financial)
    - Prevents access unless the student is logged in (handled in dashboard.js)

    Data Flow:
    - dashboard.js validates authentication via sessionStorage
    - dashboard.js fetches:
        /api/student/<username>
        /api/registration/<username>
        /api/financial/<username>
    - dashboard.js writes results into:
        #student-name
        #student-id
        #registered-count
        #account-status

    Current Implementation Notes:
    - Uses sessionStorage for session validation
    - Uses multiple backend endpoints to populate dashboard fields
    - Styling provided by css/styles.css

    Future Enhancements:
    - Add profile photo or avatar
    - Add GPA, major, advisor information
    - Add alerts for holds or overdue balances
    - Add quick links to registration or course details
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <!--
        dashboard.js handles:
        - Authentication check
        - Fetching student info
        - Fetching registered course count
        - Fetching financial/account status
        - Writing values into dashboard fields
    -->
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/dashboard.js" defer></script>
    <script src="../js/dashboard.js"></script>
</head>

<body>
<header>
    <h1>Student Dashboard</h1>
</header>

<div class="dashboard-header">
    <h2>Welcome, <span id="studentName"></span></h2>
    <button id="logoutBtn" class="logout-btn">Logout</button>
</div>
<nav>
    <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="course.html">Courses</a></li>
        <li><a href="registration.html">Registration</a></li>
        <li><a href="financial.html">Financial</a></li>
    </ul>
</nav>

<main>
    <!--
        Student information section:
        Populated dynamically by dashboard.js.
    -->
    <section id="student-info">
        <h2>Welcome, <span id="student-name"></span></h2>
        <p id="student-id"></p>
    </section>

    <!--
        Registered course count:
        dashboard.js writes the number of registered course objects here.
    -->
    <section id="course-summary">
        <h3>Registered Courses</h3>
        <p>You are registered for <span id="registered-count"></span> course(s).</p>
    </section>

    <!--
        Financial/account status:
        dashboard.js writes the student's financial standing here.
    -->
    <section id="financial-status">
        <h3>Account Status</h3>
        <p id="account-status"></p>
    </section>
</main>
</body>
</html>
